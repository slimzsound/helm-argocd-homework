apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openresty-art
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/slimzsound/helm-argocd-homework.git
    targetRevision: argo
    path: openresty-art
    helm:
      valueFiles:
        - my-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true